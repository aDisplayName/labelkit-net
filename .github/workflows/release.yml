name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      use_release_environment:
        description: 'Use GitHub release environment (approval gate + environment-scoped secrets)'
        type: boolean
        default: true

jobs:
  release:
    runs-on: ubuntu-latest
    environment: ${{ (github.event_name == 'workflow_dispatch' && inputs.use_release_environment || github.event_name != 'workflow_dispatch' && vars.USE_RELEASE_ENVIRONMENT != 'false') && 'release' || '' }}
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore src/LabelKit.sln

      - name: Build
        run: dotnet build src/LabelKit.sln -c Release --no-restore

      - name: Test
        run: dotnet test src/LabelKit.sln -c Release --no-build --verbosity normal

      - name: Pack
        run: dotnet pack src/LabelKit.sln -c Release --no-build -o ./artifacts/packages

      - name: NuGet login (OIDC)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet
        run: dotnet nuget push artifacts/packages/*.nupkg --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages-release
          path: artifacts/packages/*.nupkg
